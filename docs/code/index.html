
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Social Content Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'brand-bg': '#0D0E1B',
              'brand-surface': '#171933',
              'brand-surface-alt': '#202342',
              'brand-border': '#2E325C',
              'brand-text-primary': '#F0F2FF',
              'brand-text-secondary': '#A4A6C5',
              'brand-accent-cyan': '#25DDF2',
              'brand-accent-pink': '#F433AB',
              'brand-accent-purple': '#9333ea',
            },
            boxShadow: {
              'glow-cyan': '0 0 15px 0 rgba(37, 221, 242, 0.4)',
              'glow-pink': '0 0 15px 0 rgba(244, 51, 171, 0.4)',
            }
          },
        },
      }

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0D0E1B;
        color: #F0F2FF;
      }
      .gradient-text {
        background: linear-gradient(90deg, #25DDF2, #F433AB);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #171933;
      }
      ::-webkit-scrollbar-thumb {
        background: #2E325C;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4A4E82;
      }
    </style>
  </head>

    <div id="root"></div>
    <script type="importmap">
      {

          "react": "https://esm.sh/react@18.3.1",
