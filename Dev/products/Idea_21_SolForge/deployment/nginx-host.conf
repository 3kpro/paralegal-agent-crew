
server {
    listen 80;
    server_name solforge.3kpro.services;

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API is handled by the frontend's internal nginx proxy? 
    # Or we can expose it directly. 
    # Since the frontend container exposes 3000 which serves static files AND valid configured /api proxy via nginx,
    # we just need to route everything to 3000.
    
    # SSL/TLS certs to be managed by Certbot
}
