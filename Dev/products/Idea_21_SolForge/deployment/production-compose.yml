version: '3.8'

services:
  backend:
    image: solforge-backend:latest
    build: 
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - MOCK_MODE=False
      - LOG_LEVEL=INFO
      # - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  frontend:
    image: solforge-frontend:latest
    build:
      context: ../src/dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
