
name: SolForge CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx
        
    - name: Run Tests
      run: |
        # Run all test scripts
        python test_features.py
        python test_ai.py
        # test_telegram.py # Skips if no token
        python test_trainer.py
        # test_api needs server running, or TestClient works?
        # Our test_api starts the orchestrator which might spin forever.
        # We need a dedicated unit test suite with pytest ideally.
        # For now, run the simple scripts.
